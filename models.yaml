# Shared model registry - the single source of truth for every LLM the two
# apps (my-dev-team and my-dev-team-vs-code) may route to.
#
# Do NOT edit the generated files in the consuming repos by hand:
#   my-dev-team/src/devteam/config/tools/llms.yaml
#   my-dev-team-vs-code/src/engine/config/models/*.md
# Edit this file instead and run:  python scripts/sync_models.py
#
# Schema and conventions are documented in README.md. In short, per model:
#   id              stable registry id (also the vs-code file name and model id)
#   label           user-facing display name
#   provider        which backend hosts the model (one primary provider)
#   also_via        optional extra providers serving the same model (Azure mirrors)
#   model           provider-specific model name (Ollama tag or API model id)
#   context_window  tokens; omit when unknown (consumers then skip window checks)
#   thinking        Ollama only: whether the reasoning stream is enabled
#   triage_only     vs-code only: eligible for the triage classifier, never real work
#   capabilities    unified vocabulary, dense absolute scores in [0, 1]
#   complexity_fit  score multiplier per task complexity; the unique argmax also
#                   defines the vs-code tier (low=simple, medium=moderate, high=complex)
#   pricing         USD per million tokens; null until seeded from LiteLLM (TODO 3.1),
#                   0 for local models
#   notes           prose note, becomes the vs-code .md body
#
# Capability scores are curated on one dense scale (the fresher
# my-dev-team-vs-code convention). Models marked "provisional" in their notes
# carry estimated scores that have not been verified end-to-end.

